<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>С Днем Рождения, Висола!</title>
    <style>
        body { margin: 0; background: #0f0c29; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Сетка шариков */
        .balloon { position: absolute; width: 50px; height: 60px; background: #ff9efc; border-radius: 50%; animation: float 6s infinite ease-in-out; opacity: 0.7; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }

        .card { z-index: 10; background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); text-align: center; max-width: 500px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        h1 { margin: 0; color: #ffeb3b; text-shadow: 0 0 10px #ff9800; }

        /* Торт со свечами */
        .cake { margin: 30px auto; display: flex; justify-content: center; gap: 10px; height: 100px; align-items: flex-end; }
        .candle { width: 15px; height: 50px; background: #8bc34a; position: relative; cursor: pointer; border-radius: 5px; }
        .flame { width: 10px; height: 15px; background: #ff5722; border-radius: 50% 50% 20% 20%; position: absolute; top: -15px; left: 2.5px; animation: flicker 0.2s infinite; }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .extinguished { display: none; }
    </style>
</head>
<body>

    <div id="balloons"></div>

    <div class="card">
        <h1 id="title">С Днем Рождения, Висола!</h1>
        <p id="wish">Тебе 21! В этот особенный день желаем тебе и малышу здоровья, а вашей семье с Воиром — бесконечной любви. Ты — гордость TEAM University!</p>
        
        <div class="cake" id="cake">
            <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
            <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
            <div class="candle" onclick="blow(this)"><div class="flame"></div></div>
        </div>
        <p id="hint">Задуй все 3 свечи!</p>
    </div>

    <script>
        // Создаем летающие шарики
        for(let i=0; i<10; i++) {
            let b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random()*100 + '%';
            b.style.top = Math.random()*80 + '%';
            b.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
            b.style.animationDelay = i + 's';
            document.body.appendChild(b);
        }

        let blownCount = 0;
        function blow(el) {
            if(!el.querySelector('.flame').classList.contains('extinguished')) {
                el.querySelector('.flame').classList.add('extinguished');
                blownCount++;
                if(blownCount === 3) {
                    document.getElementById('title').innerText = "Ура! С Днём Рождения!";
                    document.getElementById('wish').innerText = "Пусть все желания сбудутся! Счастья тебе, Висола, Воиру и вашему маленькому чуду!";
                    document.getElementById('hint').innerText = "🎉 Праздник начинается!";
                }
            }
        }
    </script>
</body>
</html>
